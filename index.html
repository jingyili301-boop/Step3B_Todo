<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; letter-spacing: 1px; }
    header p  { font-size: 0.9rem; opacity: 0.85; margin-top: 0.3rem; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }

    /* FORM CARD */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 560px;
    }
    .card h2 {
      font-size: 1.2rem;
      color: #4f46e5;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #ede9fe;
      padding-bottom: 0.5rem;
    }

    /* FORM GRID */
    form {
      display: grid;
      gap: 1.2rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
    }
    label .required { color: #e53e3e; margin-left: 2px; }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fafafa;
      color: #222;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    /* TWO COLUMNS on wider screens */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    /* SUBMIT BUTTON */
    .btn-submit {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
      margin-top: 0.5rem;
    }
    .btn-submit:hover  { opacity: 0.92; }
    .btn-submit:active { transform: scale(0.98); }

    .btn-reset {
      background: #f3f4f6;
      color: #555;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: #e5e7eb; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.3rem;
    }

    /* HELPER TEXT */
    .hint {
      font-size: 0.78rem;
      color: #888;
    }

    /* FOOTER */
    footer {
      background: #1e1b4b;
      color: #c4b5fd;
      text-align: center;
      padding: 1rem;
      font-size: 0.82rem;
    }
    footer span { color: #fff; font-weight: 600; }

    /* RESPONSIVE: collapse 2-col on small screens */
    @media (max-width: 480px) {
      .row-2    { grid-template-columns: 1fr; }
      .btn-row  { grid-template-columns: 1fr; }
      .card     { padding: 1.2rem 1rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>✅ My To-Do List</h1>
    <p>Organize your tasks, stay on track</p>
  </header>

  <main>
    <div class="card">
      <h2>➕ Add a New Task</h2>

      <form action="#" method="post" novalidate>

        <!-- TITLE -->
        <div class="field">
          <label for="title">Task Title <span class="required">*</span></label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="e.g. Prepare the project report"
            required
            maxlength="100"
          >
        </div>

        <!-- DESCRIPTION -->
        <div class="field">
          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            placeholder="Add more details about this task..."
            maxlength="500"
          ></textarea>
          <span class="hint">Optional — max 500 characters</span>
        </div>

        <!-- DATES -->
        <div class="row-2">
          <div class="field">
            <label for="creationDate">Creation Date <span class="required">*</span></label>
            <input type="date" id="creationDate" name="creationDate" required>
          </div>
          <div class="field">
            <label for="dueDate">Due Date <span class="required">*</span></label>
            <input type="date" id="dueDate" name="dueDate" required>
          </div>
        </div>

        <!-- PRIORITY -->
        <div class="field">
          <label for="priority">Priority <span class="required">*</span></label>
          <select id="priority" name="idPriority" required>
            <option value="" disabled selected>— Select a priority —</option>
            <option value="1">🔴 Critical</option>
            <option value="2">🟠 High</option>
            <option value="3">🟡 Medium</option>
            <option value="4">🟢 Low</option>
            <option value="5">⚪ Optional</option>
          </select>
        </div>

        <!-- STATUS & CATEGORY -->
        <div class="row-2">
          <div class="field">
            <label for="status">Status <span class="required">*</span></label>
            <select id="status" name="idStatus" required>
              <option value="" disabled selected>— Status —</option>
              <option value="1">📋 To do</option>
              <option value="2">⏳ In progress</option>
              <option value="3">✅ Done</option>
              <option value="4">❌ Cancelled</option>
            </select>
          </div>

          <div class="field">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="idCategory" required>
              <option value="" disabled selected>— Category —</option>
              <option value="1">🏠 Personal</option>
              <option value="2">💼 Work</option>
              <option value="3">🛒 Shopping</option>
              <option value="4">❤️ Health</option>
            </select>
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="btn-row">
          <button type="reset"  class="btn-reset">🔄 Reset</button>
          <button type="submit" class="btn-submit">💾 Save Task</button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    <p>To-Do List App &mdash; Created by <span>Your Name</span> &mdash; &copy; 2026</p>
    <p>Web Development Project &mdash; All rights reserved</p>
  </footer>

</body>
</html>
