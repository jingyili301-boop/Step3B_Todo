<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do list</title>
    <link rel="stylesheet" href="style.css">
    <script>
        let priorityList = [{
                "idPriority": 1,
                "priority": "Critical"
            },
            {
                "idPriority": 2,
                "priority": "High"
            },
            {
                "idPriority": 3,
                "priority": "Medium"
            },
            {
                "idPriority": 4,
                "priority": "Low"
            },
            {
                "idPriority": 5,
                "priority": "Optional"
            }
        ];

        let statusList = [{
                "idStatus": 1,
                "status": "To do"
            },
            {
                "idStatus": 2,
                "status": "In progress"
            },
            {
                "idStatus": 3,
                "status": "Done"
            },
            {
                "idStatus": 4,
                "status": "Cancelled"
            }
        ];

        let categoryList = [{
                "idCategory": 1,
                "category": "Personal"
            },
            {
                "idCategory": 2,
                "category": "Work"
            },
            {
                "idCategory": 3,
                "category": "Shopping"
            },
            {
                "idCategory": 4,
                "category": "Health"
            }
        ];

        // 👉 在这里加 ↓↓↓
        function saveTask() {

            console.log("=== STEP 1: Read form values ===");

            let title = document.getElementById("title").value;
            let description = document.getElementById("description").value;
            let creationDate = document.getElementById("creationDate").value;
            let dueDate = document.getElementById("dueDate").value;
            let idPriority = document.getElementById("idPriority").value;
            let idCategory = document.getElementById("idCategory").value;
            let idStatus = document.getElementById("idStatus").value;

            let form = document.getElementById("taskForm");

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            let taskList = [];

            let storedTasks = localStorage.getItem("taskList");

            if (storedTasks != null) {
                taskList = JSON.parse(storedTasks);
            }

            let newId = taskList.length + 1;

            let task = {
                idTask: newId,
                title: title,
                description: description,
                creationDate: creationDate,
                dueDate: dueDate,
                idPriority: parseInt(idPriority),
                idStatus: parseInt(idStatus),
                idCategory: parseInt(idCategory)
            };

            taskList.push(task);

            localStorage.setItem("taskList", JSON.stringify(taskList));

            document.getElementById("taskForm").reset();

            alert("Task saved successfully!");
        }
    </script>
</head>

<body>
    <header>
        <h1>TO-DO LIST</h1>
    </header>

    <main>
        <section class="form-container">
            <h2>Register a New Task</h2>

            <form id="taskForm" action="#">
                <div class="field">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="e.g., Create step 3" required>
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4"
                        placeholder="Add specific notes here..."></textarea>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="creationDate">Creation Date</label>
                        <input type="date" id="creationDate" name="creationDate" required>
                    </div>

                    <div class="field">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" name="dueDate" required>
                    </div>
                </div>

                <div class="field">
                    <label for="idPriority">Priority Level</label>
                    <select id="idPriority" name="idPriority" required>
                        <option value="">-- Select Priority --</option>
                    </select>
                    <script>
                        priorityList.forEach(function (item, index) {
                            let optionHTML = `<option value="${item.idPriority}">${item.priority}</option>`;
                            document.getElementById("idPriority").insertAdjacentHTML("beforeend", optionHTML);
                        });
                    </script>
                </div>

                <div class="field">
                    <label for="idCategory">Category</label>
                    <select id="idCategory" name="idCategory" required>
                        <option value="">-- Select Category --</option>
                    </select>
                    <script>
                        categoryList.forEach(function (item, index) {
                            let optionHTML = `<option value="${item.idCategory}">${item.category}</option>`;
                            document.getElementById("idCategory").insertAdjacentHTML("beforeend", optionHTML);
                        });
                    </script>
                </div>

                <div class="field">
                    <label for="idStatus">Current Status</label>
                    <select id="idStatus" name="idStatus" required>
                        <option value="">-- Select Status --</option>
                    </select>
                    <script>
                        statusList.forEach(function (item, index) {
                            let optionHTML = `<option value="${item.idStatus}">${item.status}</option>`;
                            document.getElementById("idStatus").insertAdjacentHTML("beforeend", optionHTML);
                        });
                    </script>
                </div>

                <button type="button" class="submit-btn" onclick="saveTask()">Add New Task</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TEAM 2 | Assignment 3B</p>
    </footer>
</body>

</html>
